const glossaryData = [
{section:"Japanese Terms — Service"},
{term:"HAI",tag:"Response to chef",def:"Yes — used when responding to the chef. Example: 'Table 4 for 2, HAI chef!'"},
{term:"OUSS",tag:"Response to colleagues",def:"Yes — used when responding to colleagues or in briefing. Example: 'Section 1, OUSS!'"},
{term:"ONEGAISHIMASU",tag:"Kitchen call",def:"'Please have it' — when the chef calls Onegaishimasu it means 'Service please'"},
{term:"TORIMAS",tag:"Moving through",def:"Used to make colleagues aware you are coming through — equivalent of 'Back!'"},
{term:"ARIGATO",tag:"Thank you",def:"Thank you — used in place of 'thank you' in any situation"},
{term:"DOU ITASHIMASHITE",tag:"You're welcome",def:"You're welcome — used in place of 'you are welcome'"},
{term:"OHAYO GOZAIMASU",tag:"Morning briefing",def:"Good morning — used to initiate the morning briefing"},
{term:"KONBAWA-MINASAN",tag:"Evening briefing",def:"Good evening everyone — used to initiate the evening briefing"},
{term:"IRASSHAIMESE",tag:"Welcoming guests",def:"Welcome — used when welcoming guests into the restaurant"},
{term:"KANPAI",tag:"Dropping beverages",def:"Cheers — used specifically when dropping beverages, especially sake, to the table"},
{section:"Miso Types"},
{term:"Saikyo / Shiro (White Miso)",tag:"Miso",def:"The youngest miso. Fermented for only 3 months. Golden colour, sweet, delicate and buttery. Very subtle flavour. Used in: black cod, seabream, baby chicken, sweet potato."},
{term:"Shiro (White Miso)",tag:"Miso",def:"Milder than other misos. Fermented 6 months, made from rice and soybeans. Slight sweetness. Used in: baby chicken sauce, miso butter, chirashi spicy miso."},
{term:"Aka (Red Miso)",tag:"Miso",def:"Dark, reddish, saltier and more assertive. Fermented at least 12 months. Used in soups, dark sauces and marinades. Used in: beef fillet spicy sauce."},
{term:"Mugi (Barley Miso)",tag:"Miso",def:"Nutty texture, barley does not fully break down during fermentation. Used in: tuna tataki apple mustard dressing."},
{section:"Key Sauces & Ingredients"},
{term:"Ponzu",tag:"Sauce",def:"A citrus-based soy sauce used extensively in Japanese cooking — sauces, marinades and dressings. Contains tamari, soy sauce, mirin, sake, rice vinegar, bonito flakes and dashi. Our Ponzu is NOT vegetarian. Veg Ponzu is used for vegetable dishes."},
{term:"Wafu",tag:"Sauce / Dressing",def:"Literally means Japanese dressing. Contains soy, rice vinegar, sesame oil, grapeseed oil, green apple, onion, celery, carrots, salt and sugar. Light and refreshing — used in salads and with vegetables."},
{term:"Yuzu Kosho",tag:"Seasoning",def:"A Japanese seasoning paste made from chili, yuzu peel, garlic and oil. Has a sharp kick from the citrus and the green chili. Comes in green (milder) and red (more intense) versions."},
{term:"Mirin",tag:"Ingredient",def:"A common staple in Japanese cooking — similar to sake but much sweeter and milder. An essential ingredient in sushi rice and many sauces. Cooking alcohol."},
{term:"Rice Vinegar",tag:"Ingredient",def:"Much sweeter and milder than western vinegar. Major ingredient in Japanese cuisine — used in sushi rice, dressings, marinades."},
{term:"Tamari",tag:"Ingredient",def:"Darker than regular soy sauce, milder and more aromatic, little or no wheat. Used in many sauces at ROKA."},
{term:"Dashi",tag:"Stock",def:"A Japanese cooking stock — base for miso soups and sauces. Made with kombu (seaweed), bonito flakes, salt and water."},
{term:"Teriyaki",tag:"Sauce / Cooking",def:"A dish marinated in sauce then grilled. Our teriyaki sauce contains sake, mirin, soy, mirepoix (onion, celery, carrot, daikon), kombu, ginger, garlic and sugar. Thick and sweet."},
{term:"Kochujang / Gochujang",tag:"Korean sauce",def:"Spicy Korean sauce made from red chili, glutinous rice, fermented soy beans, salt and sugar. Used in soft shell crab maki chili mayo and lamb cutlets."},
{section:"Cooking Terms"},
{term:"Tataki (Seared)",tag:"Cooking term",def:"Preparing fish or meat by searing it very briefly — leaving the inner part practically raw — and cutting into thin slices. Used for: Tuna Tataki."},
{term:"Aburi (Torched)",tag:"Cooking term",def:"Preparing fish or meat by torching it very briefly, leaving the inner part raw. Mostly applies to nigiri."},
{term:"Tempura",tag:"Cooking term",def:"Battered fish or vegetables deep fried in oil. Light, crispy batter. Served with tentsuyu (dipping sauce of dashi, mirin and soy) with grated daikon."},
{term:"Age / Agemono",tag:"Cooking term",def:"Deep fried food items — such as soft shell crab, baby squid, etc."},
{term:"Tatami / Usuzukuri",tag:"Cutting style",def:"Thinly sliced — refers to cutting fish in very thin slices. Used for sashimi."},
{section:"Seaweed (Seaweed types)"},
{term:"Nori",tag:"Seaweed",def:"Dried seaweed in very thin sheets. Mainly used to make sushi rolls (maki). Consistency similar to rice paper. Mostly used as seasoning and garnish."},
{term:"Kombu",tag:"Seaweed",def:"A variety of kelp, dried, used to make dashi (the standard Japanese soup stock). Together with bonito flakes it creates umami flavour. Also used in sushi rice."},
{term:"Wakame",tag:"Seaweed",def:"Versatile seaweed that can be eaten in hot soups or cold in salads. Dark green colour. Used in daily Japanese cooking."},
{term:"Ao Nori",tag:"Seaweed",def:"Species of algae which grows on rocks by the ocean. Used as seasoning and garnish — you'll find it in the squid tempura seasoning and sweet potato yuzu cream."},
{section:"Herbs & Garnishes"},
{term:"Green Shiso",tag:"Herb",def:"From the mint family — hints of basil and spearmint. Used as garnish, in sashimi, sushi, maki. Can be fried for tempura. Also used in our cocktails."},
{term:"Mizuna",tag:"Herb",def:"Known as Japanese rocket. A green leaf from Kyoto, harvested in winter. Used in the Kampachi salad."},
{term:"Gari (Pickled Ginger)",tag:"Garnish",def:"Thinly sliced ginger marinated in sweetened rice vinegar. Served as condiment to refresh the palate between types of sushi."},
{term:"Wasabi",tag:"Condiment",def:"Japanese horseradish. Produces vapours that stimulate the nose rather than the tongue. Fresh wasabi grated at the table loses flavour in less than 15 minutes. We grate fresh wasabi at the table. Powdered wasabi contains no wasabi — made from horseradish and green food colouring."},
{term:"Bonito / Katsuobushi",tag:"Ingredient",def:"Member of the mackerel/tuna family. Used fresh or as dried flakes (katsuobushi). Essential ingredient in dashi. Used as garnish on warm eggplant."},
{term:"Shichimi",tag:"Spice",def:"Japanese 7-spice seasoning (togarashi). Dried mixture of red chili flakes, sansho, goma seeds, nori, shiso, dried orange peel, poppy seeds."},
{term:"Sansho",tag:"Spice",def:"Greenish brown spice — tangy and lemony but NOT hot. Used in sancho salt for salmon teriyaki and beef skewers."},
{term:"Katakuriko",tag:"Ingredient",def:"Japanese potato starch. Used for thickening and to protect food from burning while deep frying. Used in tempura batters and gyoza."},
{term:"Tenkasu / Tenkatsu",tag:"Ingredient",def:"'Tempura flakes' — crunchy bits of deep-fried flour batter. Used for crunchiness and texture — widely used in maki rolls."},
{term:"Panko",tag:"Ingredient",def:"Japanese-style breadcrumb. Traditionally used as a coating for deep-fried foods. Lighter and crunchier than regular breadcrumbs."},
{section:"Premium Ingredients"},
{term:"Wagyu",tag:"Premium",def:"Japanese cattle with extraordinary marbling. A5 is the highest grade. The fat melts at a very low temperature giving an incredibly buttery texture. Never well done — always ask temperature. Medium = al punto. Medium-rare = poco hecho."},
{term:"Oscietra Caviar",tag:"Premium",def:"Considered a delicacy. Refers only to roe from wild sturgeon in the Caspian and Black Sea. Used in Wagyu Gunkan and both tartares. 6g portion on tuna tartare."},
{term:"Truffle",tag:"Premium",def:"A highly prized fungus. Earthy, pungent and deliciously funky. Can be worth up to $3000 per 0.5kg. White truffles from Italy (Alba), black truffles from France (Périgord). Used in kampachi dressing and broccoli wafu sauce."},
{term:"Tobiko (Flying Fish Roe)",tag:"Roe",def:"Natural orange flavour with mild smoky salty taste. Can be infused to change colour: wasabi = green colour, yuzu = yellow colour. Used on salmon maki and California maki."},
{term:"Ikura (Salmon Roe)",tag:"Roe",def:"Salmon roe — larger than most fish eggs. Salty, fishy but sweet ocean flavour. When they 'pop' they release incredible flavour. Served as gunkan. Contains gluten (mixed with soy sauce)."}
];

// ============================================================
// STATE
// ============================================================
let activeTab = 'food';
let activeSection = 'starters';

// ============================================================
// HELPERS
// ============================================================
function bar(val,max,filled,empty){
  const f=Math.round((val/max)*5);
  return filled.repeat(f)+empty.repeat(5-f);
}
function wineBar(body,tannin,acid,dryness,type){
  const b='▓',e='░';
  let html='';
  if(type==='sake'){
    html+=`<div class="wine-bar"><span class="wine-bar-label">Body</span><span class="wine-bar-track">${bar(body,5,b,e)}</span></div>`;
    html+=`<div class="wine-bar"><span class="wine-bar-label">Dryness</span><span class="wine-bar-track">${bar(dryness,5,b,e)}</span></div>`;
    html+=`<div class="wine-bar"><span class="wine-bar-label">Acidity</span><span class="wine-bar-track">${bar(acid,5,b,e)}</span></div>`;
  } else if(type==='white'||type==='sparkling'){
    html+=`<div class="wine-bar"><span class="wine-bar-label">Body</span><span class="wine-bar-track">${bar(body,5,b,e)}</span></div>`;
    html+=`<div class="wine-bar"><span class="wine-bar-label">Acidity</span><span class="wine-bar-track">${bar(acid,5,b,e)}</span></div>`;
    html+=`<div class="wine-bar"><span class="wine-bar-label">Dryness</span><span class="wine-bar-track">${bar(dryness,5,b,e)}</span></div>`;
  } else {
    html+=`<div class="wine-bar"><span class="wine-bar-label">Body</span><span class="wine-bar-track">${bar(body,5,b,e)}</span></div>`;
    html+=`<div class="wine-bar"><span class="wine-bar-label">Tannins</span><span class="wine-bar-track">${bar(tannin,5,b,e)}</span></div>`;
    html+=`<div class="wine-bar"><span class="wine-bar-label">Acidity</span><span class="wine-bar-track">${bar(acid,5,b,e)}</span></div>`;
  }
  return html;
}

// ============================================================
// RENDER FOOD
// ============================================================
function buildNav(){
  const nav=document.getElementById("top-nav");
  nav.innerHTML='';
  if(activeTab!=='food'){nav.style.display='none';return;}
  nav.style.display='flex';
  sections.forEach(s=>{
    const btn=document.createElement("button");
    btn.className="nav-btn"+(s.id===activeSection?" active":"");
    btn.textContent=s.label;
    btn.style.background=s.id===activeSection?s.color:"#EEE";
    btn.style.color=s.id===activeSection?"#fff":"#444";
    btn.onclick=()=>{activeSection=s.id;buildNav();renderFood();};
    nav.appendChild(btn);
  });
}

function makeCard(d){
  const card=document.createElement("div");
  card.className="card";
  const header=document.createElement("button");
  header.className="card-header";
  header.innerHTML=`<div style="flex:1"><div class="dish-name">${d.name}</div><div class="dish-name-es">${d.nameEs}</div>${d.tempNote?`<div class="temp-note">${d.tempNote}</div>`:""}</div><span class="chevron">▼</span>`;
  const body=document.createElement("div");
  body.className="card-body";
  let html="";
  if(d.fishNote) html+=`<div class="fish-note">${d.fishNote}</div>`;
  html+=`<div class="label">Say to guests</div><div class="announce">${d.announce}</div>`;
  html+=`<div class="label">Full description</div><div class="announce-full">${d.announceFull}</div>`;
  html+=`<div class="announce-es">${d.announceEs}</div>`;
  html+=`<div class="label">Key Ingredients</div><div class="key">${d.key}</div>`;
  html+=`<div class="label">Allergens</div><div class="badges">${d.allergens.split(", ").map(a=>`<span class="badge-a">${a}</span>`).join("")}</div>`;
  if(d.diet) html+=`<div style="margin-top:8px"><span class="badge-d">${d.diet}</span></div>`;
  html+=`<div class="section-tag">Section: ${d.section}</div>`;
  body.innerHTML=html;
  header.onclick=()=>{const o=body.classList.toggle("open");header.querySelector(".chevron").textContent=o?"▲":"▼";};
  card.appendChild(header);card.appendChild(body);return card;
}

function renderFood(){
  const sec=sections.find(s=>s.id===activeSection);
  const content=document.getElementById("content");
  content.innerHTML=`<div class="section-title" style="color:${sec.color}">${sec.label}</div><div class="section-subtitle">${sec.labelEs}</div>`;
  sec.dishes.forEach(d=>content.appendChild(makeCard(d)));
}

    const card=document.createElement("div");card.className="gloss-card";

    header.innerHTML=`<div><span class="gloss-term">${item.term}</span><span class="gloss-tag">${item.tag}</span></div><span class="chevron">▼</span>`;
    const body=document.createElement("div");body.className="gloss-body";
    body.textContent=item.def;
    header.onclick=()=>{const o=body.classList.toggle("open");header.querySelector(".chevron").textContent=o?"▲":"▼";};
    card.appendChild(header);card.appendChild(body);content.appendChild(card);
  });
}

// ============================================================
// SEARCH
// ============================================================
function doSearch(val){
  const nav=document.getElementById("top-nav");
  const content=document.getElementById("content");
  if(!val||val.trim().length<2){
    nav.style.display=activeTab==='food'?'flex':'none';
    if(activeTab==='food'){buildNav();renderFood();}
    else if(activeTab==='fish'){renderFish();}
    else if(activeTab==='glossary'){renderGlossary();}
    else if(activeTab==='drinks'){renderDrinks();}
    else if(activeTab==='allergy'){renderAllergy();}
    return;
  }
  nav.style.display="none";
  const q=val.toLowerCase();
  const results=sections.flatMap(s=>s.dishes).filter(d=>
    [d.name,d.nameEs,d.allergens,d.announce,d.announceFull,d.announceEs,d.key].some(f=>f&&f.toLowerCase().includes(q))
  );
  content.innerHTML=`<div id="search-count">${results.length} result(s) for "<strong>${val}</strong>"</div>`;
  if(results.length===0){
    content.innerHTML+=`<div style="padding:20px;text-align:center;color:#888">No dishes found. Try searching by ingredient or allergen.</div>`;
  }
  results.forEach(d=>content.appendChild(makeCard(d)));
}

// ============================================================
// ALLERGY FILTER
// ============================================================
const ALL_ALLERGENS = [
  "Celery","Chili","Crustaceans","Dairy","Egg","Fish",
  "Garlic","Gluten","Molluscs","Msg","Mustard","Nuts",
  "Onion","Sesame","Soya","Alcohol"
];

let selectedAllergens = new Set();

function renderAllergy(){
  document.getElementById("top-nav").style.display="none";
  const content=document.getElementById("content");
  content.innerHTML='';

  // Warning banner
  const warn=document.createElement("div");
  warn.style.cssText="background:#FFF3CD;border:1px solid #F0C040;border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#7A4F00;line-height:1.5";
  warn.innerHTML="⚠️ <strong>Staff guide only.</strong> Always confirm with the kitchen before serving a guest with allergies. This tool does not account for cross-contamination or modifications.";
  content.appendChild(warn);

  // Title
  const title=document.createElement("div");
  title.style.cssText="font-size:18px;font-weight:800;color:#1A1A1A;margin-bottom:4px";
  title.textContent="Allergy Filter";
  content.appendChild(title);
  const sub=document.createElement("div");
  sub.style.cssText="font-size:13px;color:#888;margin-bottom:14px";
  sub.textContent="Select common allergens or search any ingredient";
  content.appendChild(sub);

  // Ingredient search bar
  const searchWrap=document.createElement("div");
  searchWrap.style.cssText="margin-bottom:14px";
  const searchLabel=document.createElement("div");
  searchLabel.style.cssText="font-size:11px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px";
  searchLabel.textContent="Search any ingredient";
  const ingredientInput=document.createElement("input");
  ingredientInput.type="text";
  ingredientInput.placeholder="e.g. garlic, ginger, yuzu, lime...";
  ingredientInput.value=window._ingredientSearch||'';
  ingredientInput.autocomplete="off";
  ingredientInput.autocorrect="off";
  ingredientInput.autocapitalize="off";
  ingredientInput.spellcheck=false;
  ingredientInput.style.cssText="width:100%;padding:10px 14px;border-radius:8px;border:2px solid #E0DDD8;font-size:16px;background:#FFF;color:#1A1A1A;outline:none;-webkit-appearance:none";
  ingredientInput.addEventListener('focus',()=>{ingredientInput.style.borderColor='#C0392B';});
  ingredientInput.addEventListener('blur',()=>{ingredientInput.style.borderColor='#E0DDD8';});
  ingredientInput.addEventListener('input',()=>{
    window._ingredientSearch=ingredientInput.value;
    renderAllergyResults(content, allergenButtonsDiv);
  });
  searchWrap.appendChild(searchLabel);
  searchWrap.appendChild(ingredientInput);
  content.appendChild(searchWrap);

  // Allergen buttons
  const allergenLabel=document.createElement("div");
  allergenLabel.style.cssText="font-size:11px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px";
  allergenLabel.textContent="Common allergens";
  content.appendChild(allergenLabel);

  const allergenButtonsDiv=document.createElement("div");
  allergenButtonsDiv.style.cssText="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px";
  ALL_ALLERGENS.forEach(a=>{
    const btn=document.createElement("button");
    const active=selectedAllergens.has(a);
    btn.style.cssText=`padding:8px 14px;border-radius:20px;border:2px solid ${active?'#C0392B':'#E0DDD8'};background:${active?'#C0392B':'#FFF'};color:${active?'#FFF':'#444'};font-size:13px;font-weight:700;cursor:pointer;transition:all .15s`;
    btn.textContent=(active?'✕ ':'')+a;
    btn.onclick=()=>{
      if(selectedAllergens.has(a)) selectedAllergens.delete(a);
      else selectedAllergens.add(a);
      renderAllergyResults(content, allergenButtonsDiv);
      // Rebuild buttons
      allergenButtonsDiv.innerHTML='';
      ALL_ALLERGENS.forEach(al=>{
        const b=document.createElement("button");
        const act=selectedAllergens.has(al);
        b.style.cssText=`padding:8px 14px;border-radius:20px;border:2px solid ${act?'#C0392B':'#E0DDD8'};background:${act?'#C0392B':'#FFF'};color:${act?'#FFF':'#444'};font-size:13px;font-weight:700;cursor:pointer`;
        b.textContent=(act?'✕ ':'')+al;
        b.onclick=btn.onclick.bind(null);
        b.onclick=()=>{
          if(selectedAllergens.has(al)) selectedAllergens.delete(al);
          else selectedAllergens.add(al);
          renderAllergy();
        };
        allergenButtonsDiv.appendChild(b);
      });
    };
    allergenButtonsDiv.appendChild(btn);
  });
  content.appendChild(allergenButtonsDiv);

  // Clear button
  const clearWrap=document.createElement("div");
  clearWrap.style.cssText="margin-bottom:16px";
  if(selectedAllergens.size>0||(window._ingredientSearch&&window._ingredientSearch.trim().length>0)){
    const clear=document.createElement("button");
    clear.style.cssText="padding:8px 16px;border-radius:20px;border:2px solid #888;background:none;color:#888;font-size:13px;font-weight:700;cursor:pointer";
    clear.textContent="Clear all";
    clear.onclick=()=>{selectedAllergens.clear();window._ingredientSearch='';renderAllergy();};
    clearWrap.appendChild(clear);
  }
  content.appendChild(clearWrap);

  // Results placeholder
  const resultsDiv=document.createElement("div");
  resultsDiv.id="allergy-results";
  content.appendChild(resultsDiv);

  renderAllergyResults(content, allergenButtonsDiv);
}

function renderAllergyResults(content){
  // Remove old results
  const old=document.getElementById("allergy-results");
  if(old) old.remove();
  const resultsDiv=document.createElement("div");
  resultsDiv.id="allergy-results";
  content.appendChild(resultsDiv);

  const ingredientQuery=(window._ingredientSearch||'').trim().toLowerCase();
  const hasAllergens=selectedAllergens.size>0;
  const hasIngredient=ingredientQuery.length>1;

  if(!hasAllergens&&!hasIngredient){
    resultsDiv.innerHTML=`<div style="text-align:center;padding:30px 20px;color:#AAA;font-size:14px">👆 Select an allergen above or search an ingredient<br>to see what the guest can eat</div>`;
    return;
  }

  // Filter dishes
  const safe=[];
  const flagged=[];

  sections.forEach(s=>{
    s.dishes.forEach(d=>{
      const allergenStr=(d.allergens||'').toLowerCase();
      const keyStr=(d.key||'').toLowerCase();
      const combined=allergenStr+' '+keyStr;

      // Check allergen buttons
      const allergenConflict=hasAllergens&&Array.from(selectedAllergens).some(sel=>
        allergenStr.includes(sel.toLowerCase())
      );

      // Check ingredient search
      const ingredientConflict=hasIngredient&&combined.includes(ingredientQuery);

      const conflict=allergenConflict||ingredientConflict;

      if(!conflict) safe.push({dish:d,section:s.label,sectionColor:s.color});
      else flagged.push({dish:d,section:s.label,sectionColor:s.color,reason:
        allergenConflict?`Contains: ${Array.from(selectedAllergens).filter(sel=>allergenStr.includes(sel.toLowerCase())).join(', ')}`:
        `Ingredient found: "${ingredientQuery}"`
      });
    });
  });

  // Active filters summary
  let filterSummary='';
  if(hasAllergens) filterSummary+=Array.from(selectedAllergens).join(', ');
  if(hasIngredient) filterSummary+=(filterSummary?' + ':'')+`"${ingredientQuery}"`;

  // Safe dishes
  const safeTitle=document.createElement("div");
  safeTitle.style.cssText="background:#D4EDDA;border:1px solid #5CB85C;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#155724;font-weight:600";
  safeTitle.innerHTML=`✅ <strong>${safe.length} dishes safe</strong> — no ${filterSummary} found`;
  resultsDiv.appendChild(safeTitle);

  if(safe.length===0){
    const none=document.createElement("div");
    none.style.cssText="text-align:center;padding:20px;color:#C0392B;font-size:14px;font-weight:600";
    none.textContent="⚠️ No safe dishes found — speak with the kitchen directly.";
    resultsDiv.appendChild(none);
  } else {
    // Group by section
    const grouped={};
    safe.forEach(({dish,section,sectionColor})=>{
      if(!grouped[section]) grouped[section]={dishes:[],color:sectionColor};
      grouped[section].dishes.push(dish);
    });
    Object.entries(grouped).forEach(([sectionName,{dishes,color}])=>{
      const secTitle=document.createElement("div");
      secTitle.style.cssText=`font-weight:800;font-size:14px;color:${color||'#444'};margin:12px 0 6px;padding-bottom:4px;border-bottom:2px solid ${color||'#EEE'}`;
      secTitle.textContent=`${sectionName} (${dishes.length})`;
      resultsDiv.appendChild(secTitle);
      dishes.forEach(d=>{
        const card=document.createElement("div");
        card.style.cssText="background:#FAFAF8;border:1px solid #C3E6CB;border-radius:8px;margin-bottom:8px;padding:12px 14px";
        card.innerHTML=`<div style="font-weight:700;font-size:14px;color:#1A1A1A">${d.name}</div>
          <div style="font-size:13px;color:#2E86C1;font-style:italic;margin-top:2px">${d.announce}</div>
          <div style="font-size:12px;color:#888;margin-top:3px">${d.announceEs}</div>
          ${d.diet?`<span style="display:inline-block;background:#D4EDDA;color:#155724;border:1px solid #5CB85C;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:600;margin-top:4px">${d.diet}</span>`:''}`;
        resultsDiv.appendChild(card);
      });
    });
  }

  // Flagged dishes (contains allergen)
  if(flagged.length>0){
    const flagTitle=document.createElement("div");
    flagTitle.style.cssText="background:#FFEBEE;border:1px solid #EF9A9A;border-radius:8px;padding:10px 12px;margin:16px 0 10px;font-size:13px;color:#B71C1C;font-weight:600";
    flagTitle.innerHTML=`❌ <strong>${flagged.length} dishes to avoid</strong>`;
    resultsDiv.appendChild(flagTitle);
    const flaggedGroup={};
    flagged.forEach(({dish,section,sectionColor,reason})=>{
      if(!flaggedGroup[section]) flaggedGroup[section]={dishes:[],color:sectionColor};
      flaggedGroup[section].dishes.push({dish,reason});
    });
    Object.entries(flaggedGroup).forEach(([sectionName,{dishes,color}])=>{
      const secTitle=document.createElement("div");
      secTitle.style.cssText=`font-weight:800;font-size:14px;color:#888;margin:10px 0 5px`;
      secTitle.textContent=sectionName;
      resultsDiv.appendChild(secTitle);
      dishes.forEach(({dish,reason})=>{
        const card=document.createElement("div");
        card.style.cssText="background:#FFF8F8;border:1px solid #FFCDD2;border-radius:8px;margin-bottom:6px;padding:10px 12px";
        card.innerHTML=`<div style="font-weight:700;font-size:13px;color:#888">${dish.name}</div>
          <div style="font-size:11px;color:#C0392B;font-weight:600;margin-top:2px">${reason}</div>`;
        resultsDiv.appendChild(card);
      });
    });
  }
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.bottom-btn').forEach(b=>b.classList.remove('active'));
  const idx={food:0,fish:1,glossary:2,drinks:3,allergy:4}[tab];
  document.querySelectorAll('.bottom-btn')[idx].classList.add('active');
  document.getElementById('search').value='';
  if(tab==='food'){buildNav();renderFood();}
  else if(tab==='fish'){renderFish();}
  else if(tab==='glossary'){renderGlossary();}
  else if(tab==='drinks'){renderDrinks();}
  else if(tab==='allergy'){renderAllergy();}
}

// INIT
switchTab('food');
</script>
